<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="page-title">Профиль</h1>
    <div class="container form-container" id="mainBlock">
        <h2 class="title">Введите Ваши данные</h2>
        <div class="columns-wrapper">
            <div class="inputs-column">
                <p class="text">Имя:</p>
                <input type="text" id="name" class="input"/>
                <p class="text">Возраст:</p>
                <input type="text" id="age"class="input"/>
                <p class="text">Город:</p>
                <input type="text" id="city"class="input"/>
                <p class="text">Хобби:</p>
                <input type="text" id="hobby"class="input"/>
            </div>
            <div class="result-column hidden" id="resultColumn">
                <h3 class="result-title">Данные сохранены</h3>
                <div class="result-text-wrapper">
                    <p id="resultText" class="result-text-content"></p>
                </div>
            </div>
        </div>
        <div class="btn-container">
            <button id="send" class="btn">Отправить данные</button>
            <button id="clear" class="btn hidden">Очистить данные</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
