<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title">Профиль</h1>
    <div class="container">
        <h2 class="title">Введите Ваши данные</h2>
        <div>
            <p class="text">Имя:</p>
            <input type="text" id="name" class="input"/>
            <p class="text">Возраста:</p>
            <input type="text" id="age"class="input"/>
            <p class="text">Города:</p>
            <input type="text" id="city"class="input"/>
            <p class="text">Хобби:</p>
            <input type="text" id="hobby"class="input"/>
        </div>
        <div class="btn-container">
            <button id="send" class="btn">Отправить данные</button>
            <button id="clear" class="btn">Очистить данные</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
